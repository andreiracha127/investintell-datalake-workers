schema_version: 1
description: v02b SLOOS quarterly one-factor screen. Inflation map and A32 remain frozen; no parameter freeze.

base_series_weights: &base_series_weights
  ACOGNO: 1.0
  INDPRO: 1.0
  PCEC96: 1.0
  PAYEMS: 1.0
  CPILFESL: 1.0
  PPIFIS: 1.0
  AHETPI: 1.0
  MICH: 1.0

inflation_weights: &inflation_weights
  consumer_prices: 0.4117647059
  producer_prices: 0.2352941176
  wages: 0.2352941176
  expectations: 0.1176470588

growth_base_05: &growth_base_05
  real_activity: 0.7125
  labor: 0.2375

growth_base_10: &growth_base_10
  real_activity: 0.675
  labor: 0.225

growth_base_15: &growth_base_15
  real_activity: 0.6375
  labor: 0.2125

temporal_stable_transforms: &temporal_stable_transforms
  quantity_index:
    acceleration_3m: 0.30
    acceleration_6m: 0.40
    change_12m: 0.30
  price_index:
    acceleration_3m: 0.35
    acceleration_6m: 0.40
    change_12m: 0.25

quarterly_level80_accel20: &quarterly_level80_accel20
  <<: *temporal_stable_transforms
  quarterly_survey_level_v1:
    level: 0.80
    delta_1q: 0.20

configs:
  - name: V02B-G0-CONTROL
    round: V02B-G0
    description: Control using v02 union L2 but selecting only A31-C-TEMPORAL-STABLE v01 series.
    v02a_status: screen_complete_no_g2
    v02a_diagnostic_references:
      - V02-G1-SURVEY-REGION-COMPOSITE-15
      - V02-G1-SURVEY-REGION-COMPOSITE-10
      - V02-G1-ICSA-LOG4W-10
    transformation_weights: *temporal_stable_transforms

  - name: V02B-G1-STANDARDS-05
    round: V02B-G1
    description: Add-only 5pct SLOOS tightening standards, using -z(DRTSCILM) quarterly level.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_05
        credit_survey: 0.05
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 1.0
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1

  - name: V02B-G1-STANDARDS-10
    round: V02B-G1
    description: Add-only 10pct SLOOS tightening standards, using -z(DRTSCILM) quarterly level.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_10
        credit_survey: 0.10
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 1.0
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1

  - name: V02B-G1-DEMAND-05
    round: V02B-G1
    description: Add-only 5pct SLOOS stronger loan demand, using +z(DRSDCILM) quarterly level.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_05
        credit_survey: 0.05
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRSDCILM: 1.0
    series_transform_overrides:
      DRSDCILM: quarterly_survey_level_v1

  - name: V02B-G1-DEMAND-10
    round: V02B-G1
    description: Add-only 10pct SLOOS stronger loan demand, using +z(DRSDCILM) quarterly level.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_10
        credit_survey: 0.10
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRSDCILM: 1.0
    series_transform_overrides:
      DRSDCILM: quarterly_survey_level_v1

  - name: V02B-G1-CREDIT-EQUAL-10
    round: V02B-G1
    description: Add-only 10pct SLOOS composite, equal standards and demand components.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_10
        credit_survey: 0.10
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 0.5
      DRSDCILM: 0.5
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1
      DRSDCILM: quarterly_survey_level_v1

  - name: V02B-G1-CREDIT-6040-10
    round: V02B-G1
    description: Add-only 10pct SLOOS composite, 60pct standards and 40pct demand.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_10
        credit_survey: 0.10
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 0.6
      DRSDCILM: 0.4
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1
      DRSDCILM: quarterly_survey_level_v1

  - name: V02B-G1-CREDIT-6040-15
    round: V02B-G1
    description: Add-only 15pct SLOOS composite, 60pct standards and 40pct demand.
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        <<: *growth_base_15
        credit_survey: 0.15
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 0.6
      DRSDCILM: 0.4
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1
      DRSDCILM: quarterly_survey_level_v1

  - name: V02B-G1-CREDIT-LEVEL80-ACCEL20-10
    round: V02B-G1
    description: Add-only 10pct SLOOS 60/40 composite with one-quarter acceleration challenger.
    transformation_weights: *quarterly_level80_accel20
    family_weights:
      growth:
        <<: *growth_base_10
        credit_survey: 0.10
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 0.6
      DRSDCILM: 0.4
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1
      DRSDCILM: quarterly_survey_level_v1
