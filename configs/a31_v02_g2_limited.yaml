      NOCDFSA066MSFRBPHI: 0.25
      GACDISA066MSFRBNY: 0.25
      NOCDISA066MSFRBNY: 0.25
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1
      DRSDCILM: quarterly_survey_level_v1
