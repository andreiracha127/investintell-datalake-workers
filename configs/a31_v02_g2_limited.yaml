schema_version: 1
description: Limited A3.1 G2 complementarity screen. Inflation map and A32 remain frozen.

base_series_weights: &base_series_weights
  ACOGNO: 1.0
  INDPRO: 1.0
  PCEC96: 1.0
  PAYEMS: 1.0
  CPILFESL: 1.0
  PPIFIS: 1.0
  AHETPI: 1.0
  MICH: 1.0

inflation_weights: &inflation_weights
  consumer_prices: 0.4117647059
  producer_prices: 0.2352941176
  wages: 0.2352941176
  expectations: 0.1176470588

temporal_stable_transforms: &temporal_stable_transforms
  quantity_index:
    acceleration_3m: 0.30
    acceleration_6m: 0.40
    change_12m: 0.30
  price_index:
    acceleration_3m: 0.35
    acceleration_6m: 0.40
    change_12m: 0.25

guardrails: &guardrails
  credit_survey_max: 0.15
  survey_diffusion_max: 0.10
  claims_labor_max: 0.05
  total_new_families_max: 0.20
  inflation_map: unchanged_from_A31-C-TEMPORAL-STABLE
  a32: A32-REF

configs:
  - name: G2-CREDIT6040-15
    round: G2
    description: Champion control from v02b SLOOS screen.
    guardrails: *guardrails
    transformation_weights: *temporal_stable_transforms
    family_weights:
      growth:
        real_activity: 0.6375
        labor: 0.2125
        credit_survey: 0.15
      inflation: *inflation_weights
    series_weights:
      <<: *base_series_weights
      DRTSCILM: 0.6
      DRSDCILM: 0.4
    series_transform_overrides:
      DRTSCILM: quarterly_survey_level_v1
      DRSDCILM: quarterly_survey_level_v1

  - name: G2-CREDIT6040-10-SURVEY05
    round: G2
