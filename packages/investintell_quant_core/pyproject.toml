[project]
name = "investintell-quant-core"
version = "0.1.0"
description = "Deterministic Investintell quant calculation core"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.26",
  "pandas>=2.2",
  "scipy>=1.13",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

