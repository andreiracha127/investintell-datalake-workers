name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

permissions:
  contents: read

jobs:
  quant-engine:
    name: quant-engine
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:packages/investintell_quant_core/src:services/quant_engine/src
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.quant-engine.lock pytest

      - name: Verify certified input pack
        run: python docker/railway-ci/verify_input_pack.py

      - name: Verify contract bundle
        run: python scripts/contract_bundle.py verify

      - name: Run governance and quant-engine tests
        run: >-
          python -m pytest
          tests/input_packs
          tests/quant_engine
          tests/quant_core
          tests/test_calibration_candidate.py
          tests/test_qc_a3_core.py
          tests/test_catalog_hash_path_independence.py
          tests/test_repeatability_matrix.py
          tests/test_shadow_readiness.py
          tests/test_shadow_pilot.py
          tests/test_a5_preflight_readiness.py
          tests/test_runtime_integration_skeleton.py
          tests/test_external_executor_handshake.py
          tests/test_controlled_shadow.py
          tests/test_remote_ci_runner.py
          -q

      - name: Compile Python modules
        run: >-
          python -m compileall
          src/calibration_candidate.py
          src/shadow_pilot.py
          src/input_packs
          services/quant_engine
          packages/investintell_quant_core

      - name: Verify calibration artifacts
        run: python docker/railway-ci/verify_calibration_artifacts.py
